name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: 10.0.x
  CONFIGURATION: Release

jobs:
  pack-nuget:
    name: Pack And Publish NuGet
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v', ''
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Unable to resolve package version from tag '${env:GITHUB_REF_NAME}'."
          }

          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        shell: pwsh
        run: |
          $projects = @(
            "src\NativeWebHost\NativeWebHost.csproj",
            "src\NativeWebHost.Windows\NativeWebHost.Windows.csproj",
            "src\NativeWebHost.Linux\NativeWebHost.Linux.csproj"
          )

          foreach ($project in $projects) {
            dotnet restore $project
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Pack desktop packages
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          New-Item -ItemType Directory -Path artifacts\nuget -Force | Out-Null
          $projects = @(
            "src\NativeWebHost\NativeWebHost.csproj",
            "src\NativeWebHost.Windows\NativeWebHost.Windows.csproj",
            "src\NativeWebHost.Linux\NativeWebHost.Linux.csproj"
          )

          foreach ($project in $projects) {
            dotnet pack $project `
              -c $env:CONFIGURATION `
              --no-restore `
              -o artifacts\nuget `
              -p:ContinuousIntegrationBuild=true `
              -p:Version=$env:PACKAGE_VERSION `
              -p:PackageVersion=$env:PACKAGE_VERSION

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Publish packages to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $packages = Get-ChildItem artifacts\nuget -Filter *.nupkg | Sort-Object Name
          if ($packages.Count -eq 0) {
            throw "No NuGet packages were produced."
          }

          foreach ($package in $packages) {
            dotnet nuget push $package.FullName `
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
              --api-key $env:GITHUB_TOKEN `
              --skip-duplicate

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Publish packages to NuGet.org
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            Write-Host "NUGET_API_KEY is not configured; skipping NuGet.org publish."
            exit 0
          }

          $packages = Get-ChildItem artifacts\nuget -Filter *.nupkg | Sort-Object Name
          foreach ($package in $packages) {
            dotnet nuget push $package.FullName `
              --source "https://api.nuget.org/v3/index.json" `
              --api-key $env:NUGET_API_KEY `
              --skip-duplicate

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

  pack-nuget-macos:
    name: Pack And Publish macOS NuGet
    # macos-26 ships with Xcode 26.x as required by the .NET 10 macOS workload.
    runs-on: macos-26
    needs: pack-nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Select Xcode 26.0
        # The .NET 10 macOS workload pins Xcode to 26.0 exactly; the macos-26
        # image defaults to a newer Xcode that the Xamarin SDK rejects.
        shell: bash
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Install macOS workload
        shell: bash
        run: dotnet workload install macos --skip-manifest-update

      - name: Pack macOS package
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.pack-nuget.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p artifacts/nuget

          dotnet restore src/NativeWebHost.Mac/NativeWebHost.Mac.csproj
          dotnet pack src/NativeWebHost.Mac/NativeWebHost.Mac.csproj \
            -c "$CONFIGURATION" \
            --no-restore \
            -o artifacts/nuget \
            -p:ContinuousIntegrationBuild=true \
            -p:Version="$PACKAGE_VERSION" \
            -p:PackageVersion="$PACKAGE_VERSION"

      - name: Publish macOS package to GitHub Packages
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          packages=(artifacts/nuget/*.nupkg)
          if [[ "${#packages[@]}" -eq 0 ]]; then
            echo "No NuGet packages were produced." >&2
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --api-key "$GITHUB_TOKEN" \
              --skip-duplicate
          done

      - name: Publish macOS package to NuGet.org
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${NUGET_API_KEY:-}" ]]; then
            echo "NUGET_API_KEY is not configured; skipping NuGet.org publish."
            exit 0
          fi

          shopt -s nullglob
          for package in artifacts/nuget/*.nupkg; do
            dotnet nuget push "$package" \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done

      - name: Upload macOS package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-macos
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

  publish-samples-windows:
    name: Publish Windows Samples
    runs-on: windows-latest
    needs: pack-nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Windows sample artifacts
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ needs.pack-nuget.outputs.version }}
        run: |
          $samples = @(
            @{ Project = "samples\NativeWebHost.Sample.Windows\NativeWebHost.Sample.Windows.csproj"; Name = "NativeWebHost.Sample.Windows-windows" }
          )

          New-Item -ItemType Directory -Path artifacts\release -Force | Out-Null

          foreach ($sample in $samples) {
            $publishDir = Join-Path "artifacts\publish" $sample.Name
            New-Item -ItemType Directory -Path $publishDir -Force | Out-Null

            $arguments = @(
              "publish", $sample.Project,
              "-c", $env:CONFIGURATION,
              "-o", $publishDir,
              "-p:ContinuousIntegrationBuild=true",
              "-p:Version=$env:PACKAGE_VERSION"
            )

            if ($sample.ContainsKey("Framework")) {
              $arguments += @("-f", $sample.Framework)
            }

            dotnet @arguments
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            $zipPath = Join-Path "artifacts\release" "$($sample.Name)-v$($env:PACKAGE_VERSION).zip"
            if (Test-Path $zipPath) {
              Remove-Item $zipPath -Force
            }

            Push-Location "artifacts\publish"
            try {
              Compress-Archive -Path $sample.Name -DestinationPath "..\release\$($sample.Name)-v$($env:PACKAGE_VERSION).zip"
            }
            finally {
              Pop-Location
            }
          }

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: sample-assets-windows
          path: artifacts/release/*.zip
          if-no-files-found: error

  publish-samples-linux:
    name: Publish Linux Samples
    runs-on: ubuntu-latest
    needs: pack-nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Linux sample artifacts
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.pack-nuget.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p artifacts/release artifacts/publish

          publish_sample() {
            local project="$1"
            local asset_name="$2"
            local framework="${3:-}"
            local publish_dir="artifacts/publish/${asset_name}"

            mkdir -p "$publish_dir"

            if [[ -n "$framework" ]]; then
              dotnet publish "$project" \
                -c "$CONFIGURATION" \
                -f "$framework" \
                -o "$publish_dir" \
                -p:ContinuousIntegrationBuild=true \
                -p:Version="$PACKAGE_VERSION"
            else
              dotnet publish "$project" \
                -c "$CONFIGURATION" \
                -o "$publish_dir" \
                -p:ContinuousIntegrationBuild=true \
                -p:Version="$PACKAGE_VERSION"
            fi

            local zip_path="artifacts/release/${asset_name}-v${PACKAGE_VERSION}.zip"
            rm -f "$zip_path"
            (
              cd artifacts/publish
              zip -qr "../release/$(basename "$zip_path")" "$(basename "$publish_dir")"
            )
          }

          publish_sample "samples/NativeWebHost.Sample.Linux/NativeWebHost.Sample.Linux.csproj" "NativeWebHost.Sample.Linux-linux"

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: sample-assets-linux
          path: artifacts/release/*.zip
          if-no-files-found: error

  publish-samples-macos:
    name: Publish macOS Samples
    # macos-26 ships with Xcode 26.x as required by the .NET 10 macOS workload.
    runs-on: macos-26
    needs: pack-nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Select Xcode 26.0
        # The .NET 10 macOS workload pins Xcode to 26.0 exactly; the macos-26
        # image defaults to a newer Xcode that the Xamarin SDK rejects.
        shell: bash
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Install macOS workload
        shell: bash
        run: dotnet workload install macos --skip-manifest-update

      - name: Publish macOS sample artifacts
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.pack-nuget.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p artifacts/release artifacts/publish

          asset_name="NativeWebHost.Sample.Mac-macos"
          publish_dir="artifacts/publish/${asset_name}"

          dotnet publish "samples/NativeWebHost.Sample.Mac/NativeWebHost.Sample.Mac.csproj" \
            -c "$CONFIGURATION" \
            -o "$publish_dir" \
            -p:ContinuousIntegrationBuild=true \
            -p:Version="$PACKAGE_VERSION"

          zip_path="artifacts/release/${asset_name}-v${PACKAGE_VERSION}.zip"
          rm -f "$zip_path"
          (
            cd artifacts/publish
            zip -qr "../release/$(basename "$zip_path")" "$(basename "$publish_dir")"
          )

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: sample-assets-macos
          path: artifacts/release/*.zip
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - pack-nuget
      - pack-nuget-macos
      - publish-samples-windows
      - publish-samples-linux
      - publish-samples-macos

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: artifacts/downloaded

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ needs.pack-nuget.outputs.version }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          mapfile -t assets < <(find artifacts/downloaded -type f | sort)

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          Release ${tag}

          Packages:
          - NativeWebHost
          - NativeWebHost.Windows
          - NativeWebHost.Linux
          - NativeWebHost.Mac

          Feed:
          - https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
          else
            gh release create "$tag" "${assets[@]}" --title "$tag" --notes-file "$notes_file"
          fi
