name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  CONFIGURATION: Release

jobs:
  build-windows:
    name: Build Framework Packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: |
          $projects = @(
            "src\NativeWebHost\NativeWebHost.csproj",
            "src\NativeWebHost.Windows\NativeWebHost.Windows.csproj",
            "src\NativeWebHost.Linux\NativeWebHost.Linux.csproj"
          )

          foreach ($project in $projects) {
            dotnet restore $project
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Build
        shell: pwsh
        run: |
          $projects = @(
            "src\NativeWebHost\NativeWebHost.csproj",
            "src\NativeWebHost.Windows\NativeWebHost.Windows.csproj",
            "src\NativeWebHost.Linux\NativeWebHost.Linux.csproj"
          )

          foreach ($project in $projects) {
            dotnet build $project -c $env:CONFIGURATION --no-restore -p:ContinuousIntegrationBuild=true
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

  build-android:
    name: Build Android Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Android workload
        shell: pwsh
        run: dotnet workload install android --skip-manifest-update

      - name: Build Android package
        shell: pwsh
        run: |
          dotnet restore src\NativeWebHost.Android\NativeWebHost.Android.csproj -p:EnableNativeWebHostAndroid=true
          dotnet build src\NativeWebHost.Android\NativeWebHost.Android.csproj -c $env:CONFIGURATION --no-restore -p:ContinuousIntegrationBuild=true -p:EnableNativeWebHostAndroid=true

  build-macos:
    name: Build macOS Package And Sample
    # macos-26 image ships with Xcode 26.x, required by the .NET 10 macOS workload
    # (Xamarin.Shared.Sdk targets refuse to build/link with older Xcode). The
    # macos-latest label is still pinned to macOS 15 (Xcode 16.x), which causes
    # "This version of .NET for macOS requires Xcode 26.0" build errors.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Select Xcode 26.0
        # The .NET 10 macOS workload (Microsoft.macOS.Sdk.net10.0_26.0 26.0.11017)
        # pins Xcode to 26.0 exactly. The macos-26 image defaults to a newer Xcode
        # (e.g. 26.2), which causes "requires Xcode 26.0" build errors. Switch to
        # the Xcode_26.0.app provided by the image.
        shell: bash
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Install macOS workload
        shell: bash
        run: dotnet workload install macos --skip-manifest-update

      - name: Build macOS package
        shell: bash
        run: dotnet build src/NativeWebHost.Mac/NativeWebHost.Mac.csproj -c "$CONFIGURATION" -p:ContinuousIntegrationBuild=true

      - name: Build macOS sample
        shell: bash
        run: dotnet build samples/NativeWebHost.Sample.Mac/NativeWebHost.Sample.Mac.csproj -c "$CONFIGURATION" -p:ContinuousIntegrationBuild=true

  build-samples:
    name: Build Desktop Samples
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build adapter samples
        shell: pwsh
        run: |
          $projects = @(
            "samples\NativeWebHost.Sample.Windows\NativeWebHost.Sample.Windows.csproj",
            "samples\NativeWebHost.Sample.Linux\NativeWebHost.Sample.Linux.csproj"
          )

          foreach ($project in $projects) {
            dotnet build $project -c $env:CONFIGURATION -p:ContinuousIntegrationBuild=true
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
